# .github/workflows/ci.yml
# 
# CI pipeline: runs on every PR to main
#   1. Lint Python (flake8, black)
#   2. Run dbt compile (no DB needed — just parses SQL)
#   3. Validate Terraform plan (optional, needs AWS creds)
# 

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  #  Python linting 
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install linters
        run: pip install flake8 black isort

      - name: Check formatting (black)
        run: black --check ingestion/ airflow/

      - name: Check imports (isort)
        run: isort --check-only ingestion/ airflow/

      - name: Lint (flake8)
        run: flake8 ingestion/ airflow/ --max-line-length=100 --ignore=E203,W503

  #  dbt compile check 
  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-core==1.7.3 dbt-redshift==1.7.1

      - name: dbt deps
        working-directory: dbt_project
        run: dbt deps

      - name: dbt compile (parse SQL without DB)
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
          REDSHIFT_HOST: "dummy.host"
          REDSHIFT_PORT: "5439"
          REDSHIFT_DATABASE: "ecom_db"
          REDSHIFT_USER: "ci_user"
          REDSHIFT_PASSWORD: "ci_password"
        run: dbt compile --target dev

  #  Terraform validate 
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infrastructure/terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: infrastructure/terraform
        run: terraform fmt -check

